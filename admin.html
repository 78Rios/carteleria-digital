<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Cartelería</title>
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a0c; --card: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .glass-card { background: var(--card); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        h1 { text-align: center; color: var(--neon); text-transform: uppercase; letter-spacing: 2px; }
        
        input[type="file"], input[type="number"] { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white; }
        
        .btn-upload { width: 100%; padding: 15px; border: 2px solid var(--neon); background: transparent; color: var(--neon); font-weight: bold; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .btn-upload:hover { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }
        
        #progress-bar { width: 0%; height: 6px; background: var(--neon); border-radius: 3px; margin-top: 10px; transition: 0.3s; }
        
        .ad-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; margin-top: 10px; }
        .ad-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
        .delete-btn { color: #ff4d4d; cursor: pointer; background: none; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Dashboard Control</h1>

    <div class="glass-card">
        <h3>Subir Contenido</h3>
        <input type="file" id="file-input" accept="image/*,video/*">
        <label>Duración en pantalla (segundos):</label>
        <input type="number" id="duration-input" value="10">
        <button class="btn-upload" onclick="uploadContent()">SUBIR A LA PANTALLA</button>
        <div id="progress-bar"></div>
    </div>

    <div class="glass-card">
        <h3>Contenido Activo</h3>
        <div id="current-playlist"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9/app.js";
    import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/9/database.js";
    import { getStorage, ref as sRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/9/storage.js";

    // CONFIGURACIÓN DE FIREBASE (La misma que arriba)
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_PROYECTO.firebaseapp.com",
        databaseURL: "https://TU_PROYECTO.firebaseio.com",
        projectId: "TU_PROYECTO",
        storageBucket: "TU_PROYECTO.appspot.com",
        messagingSenderId: "ID",
        appId: "APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const storage = getStorage(app);

    window.uploadContent = function() {
        const file = document.getElementById('file-input').files[0];
        const duration = document.getElementById('duration-input').value;
        const progress = document.getElementById('progress-bar');

        if (!file) return alert("Selecciona un archivo");

        const storagePath = sRef(storage, 'ads/' + Date.now() + "_" + file.name);
        const uploadTask = uploadBytesResumable(storagePath, file);

        uploadTask.on('state_changed', 
            (snapshot) => { progress.style.width = (snapshot.bytesTransferred / snapshot.totalBytes) * 100 + "%"; },
            (error) => alert("Error: " + error),
            () => {
                getDownloadURL(uploadTask.snapshot.ref).then((url) => {
                    const newAdRef = push(ref(db, 'screens/pantalla_main/playlist'));
                    set(newAdRef, {
                        id: newAdRef.key,
                        url: url,
                        duration: parseInt(duration),
                        type: file.type.includes('video') ? 'video' : 'image'
                    });
                    progress.style.width = "0%";
                    alert("¡Publicado!");
                });
            }
        );
    }

    // Listar contenido para poder borrarlo
    onValue(ref(db, 'screens/pantalla_main/playlist'), (snapshot) => {
        const listDiv = document.getElementById('current-playlist');
        listDiv.innerHTML = "";
        snapshot.forEach((child) => {
            const item = child.val();
            listDiv.innerHTML += `
                <div class="ad-item">
                    <img src="${item.url}">
                    <span>${item.duration}s (${item.type})</span>
                    <button class="delete-btn" onclick="deleteAd('${child.key}')">ELIMINAR</button>
                </div>
            `;
        });
    });

    window.deleteAd = function(id) {
        if(confirm("¿Quitar de la pantalla?")) {
            remove(ref(db, 'screens/pantalla_main/playlist/' + id));
        }
    }
</script>
</body>
</html>
