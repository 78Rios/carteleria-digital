<div class="admin-panel">
    <header>
        <h1>Control de Pantallas <span>v1.0</span></h1>
        <div id="status-cloud">Conectado a la Nube</div>
    </header>

    <section class="card glass">
        <h3>Añadir Nueva Publicidad</h3>
        <div class="input-group">
            <input type="text" id="ad-url" placeholder="URL de la imagen (o súbela)">
            <input type="number" id="ad-duration" placeholder="Duración (seg)" value="10">
            <button onclick="addAd()" class="btn-neon">Publicar ahora</button>
        </div>
    </section>

    <section class="card glass">
        <h3>Lista de Reproducción Actual</h3>
        <ul id="playlist-manager">
            <!-- Aquí aparecerán los anuncios dinámicamente -->
        </ul>
    </section>
</div>

<style>
    :root { --neon: #00f2ff; --bg: #0a0a0c; }
    body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; }
    
    .admin-panel { max-width: 800px; margin: 40px auto; padding: 20px; }
    
    .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 25px;
        margin-bottom: 20px;
    }

    .btn-neon {
        background: transparent;
        border: 2px solid var(--neon);
        color: var(--neon);
        padding: 10px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
        text-transform: uppercase;
    }

    .btn-neon:hover {
        background: var(--neon);
        color: black;
        box-shadow: 0 0 20px var(--neon);
    }

    .ad-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }
</style>
